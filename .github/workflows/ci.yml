name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: hs-nix-c-api
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build hs-nix-c-api-sys
        run: nix build .#hs-nix-c-api-sys

      - name: Build hs-nix-c-api
        run: nix build .#hs-nix-c-api

  autotag:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: sol/haskell-autotag@v1
        with:
          package-path: ./hs-nix-c-api
          prefix: "v"

      - uses: sol/haskell-autotag@v1
        with:
          package-path: ./hs-nix-c-api-sys
          prefix: "sys-v"
